name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      min_runs:
        description: "Minimum hyperfine runs per benchmark"
        required: false
        default: "30"
      go_count:
        description: "Go bench -count (override). Leave blank to use the default for the selected mode (5 normal, 3 quick)."
        required: false
        default: ""
      quick:
        description: "Quick mode: fewer hyperfine runs, lower Go bench -count, skip slow workloads"
        required: false
        default: "false"
        type: boolean

  # Run on PRs that potentially touch performance-sensitive code
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "internal/sandbox/**"
  #     - "internal/proxy/**"
  #     - "cmd/fence/**"

permissions:
  contents: read

jobs:
  benchmark-linux:
    name: Benchmark (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Download dependencies
        run: go mod download

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bubblewrap \
            socat \
            uidmap \
            curl \
            netcat-openbsd \
            ripgrep \
            hyperfine \
            jq \
            bc
          # Configure subuid/subgid
          echo "$(whoami):100000:65536" | sudo tee -a /etc/subuid
          echo "$(whoami):100000:65536" | sudo tee -a /etc/subgid
          sudo chmod u+s $(which bwrap)

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Build fence
        run: make build-ci

      - name: Run Go microbenchmarks
        run: |
          mkdir -p benchmarks
          QUICK="${{ github.event.inputs.quick || 'false' }}"
          GO_COUNT="${{ github.event.inputs.go_count }}"
          if [[ -z "$GO_COUNT" ]]; then
            if [[ "$QUICK" == "true" ]]; then
              GO_COUNT=3
            else
              GO_COUNT=5
            fi
          fi
          echo "Running Go benches with -count=$GO_COUNT (quick=$QUICK)"
          go test -run=^$ -bench=. -benchmem -count="$GO_COUNT" ./internal/sandbox/... | tee benchmarks/go-bench-linux.txt

      - name: Run CLI benchmarks
        run: |
          MIN_RUNS="${{ github.event.inputs.min_runs || '30' }}"
          QUICK="${{ github.event.inputs.quick || 'false' }}"

          if [[ "$QUICK" == "true" ]]; then
            ./scripts/benchmark.sh -q -o benchmarks
          else
            ./scripts/benchmark.sh -n "$MIN_RUNS" -o benchmarks
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-linux
          path: benchmarks/
          retention-days: 30

      - name: Summary
        run: |
          echo "## Linux Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for f in benchmarks/*.md; do
            [[ -f "$f" ]] && cat "$f" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Go Microbenchmarks" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '^Benchmark|^ok|^PASS' benchmarks/go-bench-linux.txt | head -50 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  benchmark-macos:
    name: Benchmark (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Download dependencies
        run: go mod download

      - name: Install dependencies
        run: |
          brew install hyperfine ripgrep coreutils jq

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Build fence
        run: make build-ci

      - name: Run Go microbenchmarks
        run: |
          mkdir -p benchmarks
          QUICK="${{ github.event.inputs.quick || 'false' }}"
          GO_COUNT="${{ github.event.inputs.go_count }}"
          if [[ -z "$GO_COUNT" ]]; then
            if [[ "$QUICK" == "true" ]]; then
              GO_COUNT=3
            else
              GO_COUNT=5
            fi
          fi
          echo "Running Go benches with -count=$GO_COUNT (quick=$QUICK)"
          go test -run=^$ -bench=. -benchmem -count="$GO_COUNT" ./internal/sandbox/... | tee benchmarks/go-bench-macos.txt

      - name: Run CLI benchmarks
        run: |
          MIN_RUNS="${{ github.event.inputs.min_runs || '30' }}"
          QUICK="${{ github.event.inputs.quick || 'false' }}"

          if [[ "$QUICK" == "true" ]]; then
            ./scripts/benchmark.sh -q -o benchmarks
          else
            ./scripts/benchmark.sh -n "$MIN_RUNS" -o benchmarks
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-macos
          path: benchmarks/
          retention-days: 30

      - name: Summary
        run: |
          echo "## macOS Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for f in benchmarks/*.md; do
            [[ -f "$f" ]] && cat "$f" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Go Microbenchmarks" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '^Benchmark|^ok|^PASS' benchmarks/go-bench-macos.txt | head -50 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

# The previous `compare` job ran `benchstat` across Linux and macOS results.
# That's semantically wrong: benchstat compares two distributions of the
# *same* benchmark, it is not a cross-platform delta tool. The per-platform
# summaries above are sufficient for ad-hoc measurement.
